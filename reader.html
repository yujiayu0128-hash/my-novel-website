<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fefcf5;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .reader-container { max-width: 800px; margin: 0 auto; }
        .reader-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }
        .back-btn {
            padding: 6px 16px;
            background: #eee;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .reader-title { font-size: 1.5rem; font-weight: 500; color: #333; }
        .reader-content {
            line-height: 1.8;
            font-size: 1rem;
            color: #333;
            white-space: pre-wrap;
            padding: 20px;
            background: white;
            border-radius: 12px;
            border: 1px solid #eee;
            min-height: 500px;
        }
        .loading, .error { text-align: center; padding: 60px; color: #999; }
        .chapter-nav {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }
        .nav-btn {
            padding: 8px 24px;
            background: #eee;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
        .nav-btn.disabled { opacity: 0.4; pointer-events: none; }
        @media (max-width: 700px) {
            body { padding: 12px; }
            .reader-title { font-size: 1.2rem; }
            .reader-content { padding: 15px; }
            .chapter-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: white;
                margin: 0;
                padding: 10px 16px;
                border-top: 1px solid #ddd;
            }
            .reader-container { padding-bottom: 70px; }
        }
    </style>
</head>
<body>
    <div class="reader-container">
        <div class="reader-header">
            <button class="back-btn" onclick="goBack()">← 返回</button>
            <h1 class="reader-title" id="bookTitle">加载中...</h1>
        </div>
        <div class="reader-content" id="bookContent"><div class="loading">加载中...</div></div>
        <div class="chapter-nav">
            <button class="nav-btn" onclick="prevChapter()" id="prevBtn">← 上一章</button>
            <button class="nav-btn" onclick="nextChapter()" id="nextBtn">下一章 →</button>
        </div>
    </div>
    <script>
        let chapters = [], fullContent = '', currentIndex = 0;
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        if (fileName) {
            document.getElementById('bookTitle').textContent = fileName.replace('.txt', '');
            loadBookContent(fileName);
        } else {
            document.getElementById('bookContent').innerHTML = '<div class="error">❌ 没有指定小说</div>';
        }
        function loadBookContent(fileName) {
            fetch('novels/小说/' + encodeURIComponent(fileName))
                .then(r => { if (!r.ok) throw new Error('文件不存在'); return r.text(); })
                .then(content => {
                    fullContent = content;
                    parseChapters(content);
                    if (chapters.length > 0) showChapter(0);
                    else {
                        document.getElementById('bookContent').innerHTML = content.replace(/\n/g, '<br>');
                        document.getElementById('prevBtn').classList.add('disabled');
                        document.getElementById('nextBtn').classList.add('disabled');
                    }
                })
                .catch(() => { document.getElementById('bookContent').innerHTML = '<div class="error">❌ 读取失败</div>'; });
        }
        function parseChapters(content) {
            let lines = content.split('\n');
            chapters = [];
            let chapterPattern = /^第[一二三四五六七八九十\d]+章|^Chapter\s*\d+/i;
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (chapterPattern.test(line)) chapters.push({ title: line, startLine: i });
            }
            if (chapters.length === 0) chapters = [{ title: '全文', startLine: 0 }];
        }
        function showChapter(index) {
            currentIndex = index;
            let start = chapters[index].startLine;
            let end = (index + 1 < chapters.length) ? chapters[index + 1].startLine : fullContent.split('\n').length;
            let lines = fullContent.split('\n').slice(start, end);
            document.getElementById('bookContent').innerHTML = lines.join('\n').replace(/\n/g, '<br>');
            let prev = document.getElementById('prevBtn'), next = document.getElementById('nextBtn');
            if (index === 0) prev.classList.add('disabled'); else prev.classList.remove('disabled');
            if (index === chapters.length - 1) next.classList.add('disabled'); else next.classList.remove('disabled');
        }
        function prevChapter() { if (currentIndex > 0) showChapter(currentIndex - 1); }
        function nextChapter() { if (currentIndex < chapters.length - 1) showChapter(currentIndex + 1); }
        function goBack() { window.location.href = 'index.html'; }
    </script>
</body>
</html>
