<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读小说</title>
    <link rel="stylesheet" href="style.css">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #fefcf5;
        padding: 1rem;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    .reader-container {
        max-width: 3000px;
        margin: 100%;
        background: #fefcf5;
        position: relative;
    }

    .reader-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid #f0eaff;
    }

    .back-btn {
        padding: 8px 20px;
        background: #f0eaff;
        border: none;
        border-radius: 30px;
        color: #4a4458;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
    }

    .back-btn:hover {
        background: #e5d9ff;
    }

    .reader-title {
        font-size: 1.8rem;
        color: #2d2a3a;
        margin: 0;
    }

    .history-icon {
        position: absolute;
        top: 0;
        right: 0;
        width: 40px;
        height: 40px;
        background: #f0eaff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid #e0d5f5;
        z-index: 100;
    }

    .history-icon:hover {
        background: #e5d9ff;
        transform: scale(1.1);
    }

    .history-popup {
        position: absolute;
        top: 50px;
        right: 0;
        width: 300px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        border: 1px solid #f0eaff;
        padding: 16px;
        display: none;
        z-index: 99;
        max-height: 400px;
        overflow-y: auto;
    }

    .history-popup.show {
        display: block;
    }

    .history-popup h3 {
        margin: 0 0 12px 0;
        color: #333;
        font-size: 1rem;
        font-weight: 500;
        padding-bottom: 8px;
        border-bottom: 1px solid #f0eaff;
    }

    .history-item {
        padding: 10px;
        border-bottom: 1px solid #f5f5f5;
        font-size: 0.9rem;
        color: #666;
        cursor: pointer;
        transition: background 0.2s;
    }

    .history-item:hover {
        background: #f8f5ff;
    }

    .history-item .chapter {
        font-weight: 500;
        color: #333;
        margin-bottom: 4px;
    }

    .history-item .date {
        font-size: 0.8rem;
        color: #999;
    }

    .history-item .preview {
        font-size: 0.85rem;
        color: #666;
        margin-top: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .no-history {
        text-align: center;
        padding: 20px;
        color: #999;
        font-size: 0.9rem;
    }

    .chapter-panel {
        display: flex;
        gap: 30px;
        min-height: 600px;
        margin-bottom: 40px;
    }

    .chapter-list {
        width: 280px;
        background: #f8f5ff;
        border-radius: 20px;
        padding: 20px;
        overflow-y: auto;
        border: 1px solid #e0d5f5;
        max-height: 70vh;
    }

    .chapter-list h3 {
        margin: 0 0 15px 0;
        color: #4a4458;
        font-size: 1.2rem;
        padding-bottom: 10px;
        border-bottom: 2px solid #e0d5f5;
    }

    .chapter-item {
        padding: 10px 15px;
        margin: 5px 0;
        background: white;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid #e0d5f5;
        font-size: 0.95rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .chapter-item:hover {
        background: #e5d9ff;
        border-color: #9b7bff;
    }

    .chapter-item.active {
        background: #9b7bff;
        color: white;
        border-color: #9b7bff;
    }

    .reader-content {
        flex: 1;
        line-height: 1.8;
        font-size: 1.1rem;
        color: #333;
        white-space: pre-wrap;
        font-family: 'Georgia', serif;
        overflow-y: auto;
        padding: 25px;
        background: white;
        border-radius: 20px;
        border: 1px solid #f0eaff;
        max-height: 70vh;
    }

    .loading {
        text-align: center;
        padding: 100px;
        color: #7a739b;
        font-size: 1.2rem;
    }

    .error {
        text-align: center;
        padding: 100px;
        color: #ff6b6b;
        font-size: 1.2rem;
    }

    .chapter-nav {
        margin-top: 20px;
        padding: 20px 0 0 0;
        border-top: 1px solid #f0eaff;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: white;
        max-width: 100%;
    }

    .nav-btn {
        padding: 12px 32px;
        background: #f0eaff;
        border: none;
        border-radius: 40px;
        color: #4a4458;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
        min-width: 120px;
    }

    .nav-btn:hover {
        background: #e5d9ff;
    }

    .nav-btn.disabled {
        opacity: 0.3;
        pointer-events: none;
    }

    #chapterInfo {
        color: #666;
        font-size: 1rem;
        font-weight: 500;
    }

    @media (max-width: 768px) {
        body {
            padding: 1rem;
        }

        .chapter-panel {
            flex-direction: column;
            gap: 15px;
            min-height: auto;
            margin-bottom: 80px;
        }

        .chapter-list {
            width: 100%;
            max-height: 200px;
        }

        .reader-header {
            flex-wrap: wrap;
        }

        .reader-content {
            max-height: 60vh;
        }

        .chapter-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: white;
            border-top: 1px solid #f0eaff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 15;
            margin: 0;
            border-radius: 0;
        }

        .chapter-nav .nav-btn {
            padding: 8px 20px;
            min-width: 90px;
        }

        .reader-container {
            padding-bottom: 20px;
        }
    }
</style>
</head>
<body>
    <div class="reader-container">
        <div class="history-icon" id="historyIcon" onclick="toggleHistory()">⏳</div>

        <div class="history-popup" id="historyPopup">
            <h3>阅读历史</h3>
            <div id="historyList">
                <div class="no-history">暂无阅读记录</div>
            </div>
        </div>

        <div class="reader-header">
            <button class="back-btn" onclick="goBack()">← 返回主页</button>
            <h1 class="reader-title" id="bookTitle">加载中...</h1>
        </div>

        <div class="chapter-panel">
            <div class="chapter-list" id="chapterList">
                <h3>章节列表</h3>
                <div id="chapters">加载章节中...</div>
            </div>

            <div class="reader-content" id="bookContent">
                <div class="loading">正在加载小说内容...</div>
            </div>
        </div>

        <div class="chapter-nav">
            <button class="nav-btn" onclick="prevChapter()" id="prevBtn">← 上一章</button>
            <span id="chapterInfo">1/66</span>
            <button class="nav-btn" onclick="nextChapter()" id="nextBtn">下一章 →</button>
        </div>
    </div>

    <script>
        let chapters = [];
        let fullContent = '';
        let readingHistory = [];
        let currentChapter = '';
        let currentLine = 0;
        let currentBook = '';
        
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        
        if (fileName) {
            document.getElementById('bookTitle').textContent = fileName.replace('.txt', '');
            currentBook = fileName.replace('.txt', '');
            loadHistory();
            loadBookContent(fileName);
        } else {
            document.getElementById('bookContent').innerHTML = '<div class="error">❌ 没有指定要阅读的小说</div>';
        }
        
        function loadBookContent(fileName) {
            fetch('novels/小说/' + encodeURIComponent(fileName))
                .then(response => {
                    if (!response.ok) {
                        throw new Error('文件不存在或无法读取');
                    }
                    return response.text();
                })
                .then(content => {
                    fullContent = content;
                    parseChapters(content);
                    
                    if (chapters.length > 0) {
                        showChapter(0);
                    } else {
                        displayContent(content);
                    }
                })
                .catch(error => {
                    document.getElementById('bookContent').innerHTML = 
                        '<div class="error">❌ 读取失败：' + error.message + '</div>';
                });
        }
        
        function loadHistory() {
            const historyStr = localStorage.getItem('readingHistory_' + currentBook);
            if (historyStr) {
                readingHistory = JSON.parse(historyStr);
            } else {
                readingHistory = [];
            }
            renderHistory();
        }
        
        function saveReadingPosition() {
            if (!currentBook || !currentChapter) return;
            
            const contentDiv = document.getElementById('bookContent');
            const paragraphs = contentDiv.querySelectorAll('p');
            let currentLineNumber = 0;
            
            if (paragraphs.length > 0) {
                const scrollTop = contentDiv.scrollTop;
                let accumulatedHeight = 0;
                
                for (let i = 0; i < paragraphs.length; i++) {
                    const paragraph = paragraphs[i];
                    const paragraphHeight = paragraph.offsetHeight;
                    
                    if (scrollTop < accumulatedHeight + paragraphHeight) {
                        currentLineNumber = i;
                        break;
                    }
                    accumulatedHeight += paragraphHeight;
                }
            }
            
            let previewText = '';
            if (paragraphs[currentLineNumber]) {
                previewText = paragraphs[currentLineNumber].textContent.substring(0, 50);
            } else {
                previewText = contentDiv.textContent.split('\n')[0].substring(0, 50);
            }
            
            const record = {
                chapter: currentChapter,
                line: currentLineNumber,
                date: new Date().toLocaleDateString('zh-CN'),
                preview: previewText + '...',
                book: currentBook
            };
            
            const existingIndex = readingHistory.findIndex(r => r.chapter === currentChapter);
            if (existingIndex !== -1) {
                readingHistory[existingIndex] = record;
            } else {
                readingHistory.unshift(record);
            }
            
            if (readingHistory.length > 100) {
                readingHistory = readingHistory.slice(0, 100);
            }
            
            localStorage.setItem('readingHistory_' + currentBook, JSON.stringify(readingHistory));
            renderHistory();
        }
        
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            
            if (readingHistory.length === 0) {
                historyList.innerHTML = '<div class="no-history">暂无阅读记录</div>';
                return;
            }
            
            let html = '';
            readingHistory.forEach((record, index) => {
                html += `
                    <div class="history-item" onclick="jumpToHistory(${index})">
                        <div class="chapter">${record.chapter}</div>
                        <div class="date">${record.date}</div>
                        <div class="preview">${record.preview}</div>
                    </div>
                `;
            });
            
            historyList.innerHTML = html;
        }
        
        function jumpToHistory(index) {
            const record = readingHistory[index];
            if (!record) return;
            
            const chapterIndex = chapters.findIndex(c => c.title === record.chapter);
            if (chapterIndex !== -1) {
                showChapter(chapterIndex);
                
                setTimeout(() => {
                    const contentDiv = document.getElementById('bookContent');
                    const paragraphs = contentDiv.querySelectorAll('p');
                    if (paragraphs.length > record.line) {
                        let targetPosition = 0;
                        for (let i = 0; i < record.line; i++) {
                            targetPosition += paragraphs[i].offsetHeight;
                        }
                        
                        contentDiv.scrollTop = targetPosition;
                        
                        paragraphs[record.line].style.backgroundColor = '#fff3bf';
                        paragraphs[record.line].style.transition = 'background-color 0.5s';
                        setTimeout(() => {
                            paragraphs[record.line].style.backgroundColor = 'transparent';
                        }, 2000);
                    }
                }, 100);
            }
            
            document.getElementById('historyPopup').classList.remove('show');
        }
        
        function toggleHistory() {
            document.getElementById('historyPopup').classList.toggle('show');
        }
        
        document.addEventListener('click', function(event) {
            const icon = document.getElementById('historyIcon');
            const popup = document.getElementById('historyPopup');
            if (!icon.contains(event.target) && !popup.contains(event.target)) {
                popup.classList.remove('show');
            }
        });
        
        function parseChapters(content) {
            const currentBook = document.getElementById('bookTitle').textContent;
            
            if (currentBook.includes('悬日')) {
                const lines = content.split('\n');
                chapters = [];
                let introLines = [];
                let foundFirstChapter = false;
                
                lines.forEach((line, index) => {
                    const trimmedLine = line.trim();
                    if (trimmedLine === '') return;
                    
                    if (trimmedLine.match(/^[PN][.\s]?/)) {
                        if (!foundFirstChapter && index > 0) {
                            for (let i = 0; i < index; i++) {
                                if (lines[i].trim() !== '') {
                                    introLines.push(lines[i]);
                                }
                            }
                            if (introLines.length > 0) {
                                chapters.push({
                                    title: '简介',
                                    lineNumber: 0,
                                    isIntro: true
                                });
                            }
                            foundFirstChapter = true;
                        }
                        chapters.push({
                            title: trimmedLine,
                            lineNumber: index
                        });
                    }
                });
                
                if (chapters.length === 0) {
                    chapters.push({
                        title: '全文',
                        lineNumber: 0
                    });
                }
                renderChapterList();
                return;
            }
            
            const chapterPatterns = [
                /^第[一二三四五六七八九十\d]+章/g,
                /^Chapter\s*\d+/gi,
                /^第[一二三四五六七八九十\d]+节/g,
                /^Part\s*\d+/gi,
                /^第[一二三四五六七八九十\d]+卷/gm
            ];
            
            const lines = content.split('\n');
            chapters = [];
            let foundFirstChapter = false;
            let introLines = [];
            
            lines.forEach((line, index) => {
                const trimmedLine = line.trim();
                if (trimmedLine === '') return;
                
                let isChapterTitle = false;
                for (let pattern of chapterPatterns) {
                    pattern.lastIndex = 0;
                    if (pattern.test(trimmedLine)) {
                        isChapterTitle = true;
                        break;
                    }
                }
                
                if (isChapterTitle && trimmedLine.length < 30) {
                    if (!foundFirstChapter && index > 0) {
                        for (let i = 0; i < index; i++) {
                            if (lines[i].trim() !== '') {
                                introLines.push(lines[i]);
                            }
                        }
                        if (introLines.length > 0) {
                            chapters.push({
                                title: '简介',
                                lineNumber: 0,
                                isIntro: true
                            });
                        }
                        foundFirstChapter = true;
                    }
                    chapters.push({
                        title: trimmedLine,
                        lineNumber: index
                    });
                }
            });
            
            if (chapters.length === 0) {
                chapters.push({
                    title: '全文',
                    lineNumber: 0
                });
            }
            renderChapterList();
        }
        
        function renderChapterList() {
            const chaptersDiv = document.getElementById('chapters');
            
            if (chapters.length === 0) {
                chaptersDiv.innerHTML = '<div style="color: #7a739b; text-align: center;">无章节标记</div>';
                return;
            }
            
            let html = '';
            chapters.forEach((chapter, index) => {
                html += `<div class="chapter-item" onclick="showChapter(${index})">${chapter.title}</div>`;
            });
            
            chaptersDiv.innerHTML = html;
        }
        
        function showChapter(index) {
            currentChapter = chapters[index].title;
            currentLine = 0;
            
            document.querySelectorAll('.chapter-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelectorAll('.chapter-item')[index]?.classList.add('active');

            const lines = fullContent.split('\n');
            
            if (chapters[index].isIntro) {
                const firstChapterIndex = chapters.findIndex(c => !c.isIntro);
                if (firstChapterIndex !== -1) {
                    const endLine = chapters[firstChapterIndex].lineNumber;
                    const introLines = lines.slice(0, endLine);
                    const introContent = introLines.join('\n');
                    displayContent(introContent);
                } else {
                    displayContent(fullContent);
                }
                saveReadingPosition();
                updateNavButtons();
                return;
            }
            
            const startLine = chapters[index].lineNumber;
            const endLine = (index < chapters.length - 1) ? chapters[index + 1].lineNumber : lines.length;
            const chapterLines = lines.slice(startLine, endLine);
            const chapterContent = chapterLines.join('\n');
            displayContent(chapterContent);
            saveReadingPosition();
            updateNavButtons();
        }
        
        function displayContent(content) {
            const formattedContent = content.split('\n').map(paragraph => {
                if (paragraph.trim() === '') {
                    return '<br>';
                }
                return '<p>' + paragraph + '</p>';
            }).join('');
            
            document.getElementById('bookContent').innerHTML = formattedContent;
            document.getElementById('bookContent').scrollTop = 0;
            
            const contentDiv = document.getElementById('bookContent');
            contentDiv.onscroll = function() {
                clearTimeout(window.scrollTimer);
                window.scrollTimer = setTimeout(() => {
                    saveReadingPosition();
                }, 500);
            };
        }
        
        function goBack() {
            window.location.href = 'index.html';
        }
        
        function prevChapter() {
            const currentIndex = chapters.findIndex(c => c.title === currentChapter);
            if (currentIndex > 0) {
                showChapter(currentIndex - 1);
            }
        }
        
        function nextChapter() {
            const currentIndex = chapters.findIndex(c => c.title === currentChapter);
            if (currentIndex < chapters.length - 1) {
                showChapter(currentIndex + 1);
            }
        }
        
        function updateNavButtons() {
            const currentIndex = chapters.findIndex(c => c.title === currentChapter);
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const chapterInfo = document.getElementById('chapterInfo');
            
            if (prevBtn) {
                if (currentIndex <= 0) {
                    prevBtn.classList.add('disabled');
                } else {
                    prevBtn.classList.remove('disabled');
                }
            }
            
            if (nextBtn) {
                if (currentIndex >= chapters.length - 1) {
                    nextBtn.classList.add('disabled');
                } else {
                    nextBtn.classList.remove('disabled');
                }
            }
            
            if (chapterInfo) {
                chapterInfo.textContent = `${currentIndex + 1}/${chapters.length}`;
            }
        }
    </script>
</body>
</html>
