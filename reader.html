<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读小说 · 私人图书馆</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="reader-container">
        <div class="reader-header">
            <button class="back-btn" onclick="goBack()">← 返回图书馆</button>
            <h1 class="reader-title" id="bookTitle">加载中...</h1>
        </div>
        <div class="reader-content" id="bookContent">
            正在加载小说内容...
        </div>
    </div>
    
    <script>
        // 获取URL参数中的文件名
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        
        if (fileName) {
            document.getElementById('bookTitle').textContent = fileName.replace('.txt', '');
            loadBookContent(fileName);
        } else {
            document.getElementById('bookContent').textContent = '没有指定要阅读的小说';
        }
        
        function loadBookContent(fileName) {
            // 在实际部署时，这里需要从服务器读取文件
            // 现在先模拟一些内容
            setTimeout(() => {
                document.getElementById('bookContent').innerHTML = `
                    这是《${fileName.replace('.txt', '')}》的内容。<br><br>
                    在真正的网站中，这里会显示小说的完整文本。<br><br>
                    你需要把小说文件上传到服务器，然后用后端代码读取。<br><br>
                    目前这是模拟显示。下载功能已经可用，你可以先下载小说到电脑上看。
                `;
            }, 500);
        }
        
        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
