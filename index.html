<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说馆</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>小说馆</h1>
            <p>共 <span id="bookCount">0</span> 本小说</p>
        </header>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索小说..." onkeyup="searchBooks()">
        </div>
        <div class="book-list" id="bookList">
            <div class="loading">加载中...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
